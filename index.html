(function ensureEyeWorks(){
  var tries = 0, maxTries = 40; // đợi phần tử render
  var timer = setInterval(function(){
    tries++;

    // cố gắng bắt đúng input dù bạn đổi name/placeholder
    var input =
      document.getElementById('lp_password') ||
      document.querySelector('input[name="passwork"]') ||  // bạn đang đặt name là 'passwork'
      document.querySelector('input[placeholder="Mật khẩu"]') ||
      document.querySelector('input[type="password"]');

    var eye = document.getElementById('eye_toggle');

    if (input && eye) {
      clearInterval(timer);

      // luôn ép về password lúc đầu (phòng khi template reset về text)
      try { input.type = 'password'; } catch(e){}

      // nếu bị lớp khác che, nâng z-index
      eye.style.zIndex = '9999';
      eye.style.cursor = 'pointer';

      // container static -> relative để icon chồng đúng
      try {
        var p = input.parentElement, cs = p && getComputedStyle(p).position;
        if (cs === 'static') p.style.position = 'relative';
      } catch(e){}

      // Toggle khi click
      var show = false;
      function toggle(){ show = !show; input.type = show ? 'text' : 'password'; }

      eye.addEventListener('click', toggle);

      // hỗ trợ nhấn giữ + chạm trên mobile
      eye.addEventListener('mousedown', function(){ input.type = 'text'; });
      eye.addEventListener('mouseup',   function(){ input.type = 'password'; });
      eye.addEventListener('mouseleave',function(){ if (document.activeElement !== input) input.type = 'password'; });
      eye.addEventListener('touchstart',function(e){ e.preventDefault(); input.type = 'text'; }, {passive:false});
      eye.addEventListener('touchend',  function(){ input.type = 'password'; });

      console.log('[OK] Eye toggle gắn xong');
    }

    if (tries >= maxTries) {
      clearInterval(timer);
      console.warn('[FAIL] Không tìm thấy input/eye. Kiểm tra ID: lp_password, eye_toggle');
    }
  }, 300);
})();

  eye.addEventListener('mouseleave',function(){
    if (document.activeElement !== input) input.type='password';
  });
});
